<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档管理 - 报告对比分析平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
            color: #333;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 220px;
            background-color: #1e68c4;
            color: #fff;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            top: 0;
            left: 0;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .sidebar .logo {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #2979d1;
            font-size: 16px;
            font-weight: bold;
            background-color: #195bb8;
        }

        .sidebar .nav-menu {
            padding-top: 20px;
        }

        .sidebar .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .sidebar .nav-item:hover {
            background-color: #2979d1;
        }

        .sidebar .nav-item.active {
            background-color: #2979d1;
        }

        /* 右侧主内容区 */
        .main-content {
            flex: 1;
            margin-left: 220px;
            padding: 20px;
        }

        /* 顶部工具栏 */
        .header {
            background-color: #fff;
            padding: 15px 20px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header .title {
            font-size: 18px;
            font-weight: bold;
            color: #1e68c4;
        }

        .header .user-info {
            display: flex;
            align-items: center;
        }

        .header .user-info span {
            margin-right: 10px;
            font-size: 14px;
        }

        .header .btn {
            padding: 6px 12px;
            background-color: #1e68c4;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 13px;
        }

        .header .btn:hover {
            background-color: #2979d1;
        }

        /* 搜索筛选区 */
        .search-section {
            background-color: #fff;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .search-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .search-form .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .search-form .form-item label {
            font-size: 13px;
            color: #666;
        }

        .search-form .form-item input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            width: 180px;
        }

        .search-form .form-item input:focus {
            outline: none;
            border-color: #1e68c4;
        }

        .search-form .btn-group {
            display: flex;
            gap: 10px;
        }

        .search-form button {
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-size: 13px;
        }

        /* 全局按钮样式 */
        .btn-primary {
            background-color: #1e68c4;
            color: #fff;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-size: 13px;
        }

        .btn-primary:hover {
            background-color: #2979d1;
        }

        .btn-default {
            background-color: #f0f2f5;
            color: #333;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-size: 13px;
        }

        .btn-default:hover {
            background-color: #e5e7eb;
        }

        .search-form .btn-primary {
            background-color: #1e68c4;
            color: #fff;
        }

        .search-form .btn-primary:hover {
            background-color: #2979d1;
        }

        .search-form .btn-default {
            background-color: #f0f2f5;
            color: #333;
        }

        .search-form .btn-default:hover {
            background-color: #e5e7eb;
        }

        /* 统计信息栏 */
        .stats-bar {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f0fe 100%);
            border: 1px solid #e0e7ff;
            border-radius: 6px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
        }

        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-bar .stat-label {
            font-size: 13px;
            color: #666;
        }

        .stats-bar .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #1e68c4;
        }

        /* 数据表格 */
        .data-table {
            background-color: #fff;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background-color: #f8f9fa;
            padding: 14px 16px;
            text-align: left;
            font-weight: bold;
            color: #333;
            font-size: 13px;
            border-bottom: 1px solid #eee;
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
            color: #333;
        }

        .data-table tr:hover {
            background-color: #f8f9fa;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        /* 操作按钮 */
        .data-table .operate-btns {
            display: flex;
            gap: 8px;
        }

        .data-table .operate-btns button {
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-size: 12px;
        }

        .data-table .btn-view {
            background-color: #e8f0fe;
            color: #1e68c4;
        }

        .data-table .btn-view:hover {
            background-color: #1e68c4;
            color: #fff;
        }

        .data-table .btn-upload {
            background-color: #f0f9ff;
            color: #0284c7;
        }

        .data-table .btn-upload:hover {
            background-color: #0284c7;
            color: #fff;
        }

        .data-table .btn-delete {
            background-color: #fef2f2;
            color: #e53935;
        }

        .data-table .btn-delete:hover {
            background-color: #e53935;
            color: #fff;
        }

        /* 空数据提示 */
        .empty-tip {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-tip .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-tip .text {
            font-size: 14px;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 20px;
            gap: 8px;
        }

        .pagination button {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background-color: #fff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .pagination button:hover:not(:disabled) {
            border-color: #1e68c4;
            color: #1e68c4;
        }

        .pagination button.active {
            background-color: #1e68c4;
            color: #fff;
            border-color: #1e68c4;
        }

        .pagination button:disabled {
            cursor: not-allowed;
            color: #ccc;
        }

        /* 自定义弹窗样式 */
        .custom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .custom-modal.show {
            display: flex;
        }

        .custom-modal-content {
            background-color: #fff;
            border-radius: 8px;
            padding: 24px;
            min-width: 400px;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: modalSlideIn 0.2s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-modal-header {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }

        .custom-modal-body {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .custom-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .custom-modal-footer button {
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-size: 13px;
        }

        .custom-modal-footer .btn-cancel {
            background-color: #f0f2f5;
            color: #333;
        }

        .custom-modal-footer .btn-cancel:hover {
            background-color: #e5e7eb;
        }

        .custom-modal-footer .btn-confirm {
            background-color: #1e68c4;
            color: #fff;
        }

        .custom-modal-footer .btn-confirm:hover {
            background-color: #2979d1;
        }

        /* 上传弹窗 */
        .upload-modal-body {
            padding: 20px 0;
        }

        .upload-area-modal {
            border: 2px dashed #d0d7e3;
            border-radius: 6px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .upload-area-modal:hover {
            border-color: #1e68c4;
        }

        .upload-area-modal .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-area-modal .text {
            color: #666;
            font-size: 14px;
        }

        .upload-area-modal .tip {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        /* 查看报告弹窗 */
        .report-list-modal {
            max-height: 300px;
            overflow-y: auto;
        }

        .report-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .report-list-item .name {
            font-size: 13px;
            color: #333;
        }

        .report-list-item .date {
            font-size: 12px;
            color: #999;
        }

        .report-list-item .delete {
            color: #e53935;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>

    <!-- 自定义弹窗 -->

            <div class="custom-modal-body" id="customModalBody">内容</div>
            <div class="custom-modal-footer" id="customModalFooter">
                <button class="btn-confirm" onclick="closeCustomModal()">确定</button>
            </div>
        </div>
    </div>

    <!-- 选择人员弹窗 -->
    <div class="custom-modal" id="selectPersonModal">
        <div class="custom-modal-content" style="max-width: 700px; max-height: 85vh; display: flex; flex-direction: column;">
            <div class="custom-modal-header" style="border-bottom: 2px solid #1e68c4; padding: 18px 24px;">
                <span style="font-size: 18px; font-weight: bold; color: #1e68c4;">选择人员生成对比报告</span>
                <span style="font-size: 13px; color: #999; margin-left: 10px;">点击人员卡片进行选择</span>
            </div>
            <div class="custom-modal-body" style="padding: 20px 24px; flex: 1; overflow: hidden; display: flex; flex-direction: column;">
                <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                    <div style="flex: 1; position: relative;">
                        <input type="text" id="personSearchInput" placeholder="搜索姓名或身份证号" 
                               style="width: 100%; padding: 10px 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; transition: border-color 0.3s;"
                               onfocus="this.style.borderColor='#1e68c4'" onblur="this.style.borderColor='#ddd'">
                        <span style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #999;">🔍</span>
                    </div>
                    <button class="btn-primary" onclick="searchPerson()">搜索</button>
                </div>
                <div style="background-color: #f8f9fa; padding: 10px 15px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; color: #666;">
                    <span id="selectedPersonInfo">未选择人员</span>
                </div>
                <div id="personListContainer" style="flex: 1; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 8px; background-color: #fff;">
                    <!-- 人员列表动态生成 -->
                </div>
            </div>
            <div class="custom-modal-footer" style="padding: 18px 24px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 12px;">
                <button class="btn-default" onclick="closeSelectPersonModal()">取消</button>
                <button class="btn-primary" onclick="generateReportFromSelected()">生成报告</button>
            </div>
        </div>
    </div>

                    { fileName: '王五-110101199212203456-20230301.docx', date: '2023-03-01' },
                    { fileName: '王五-110101199212203456-20230410.docx', date: '2023-04-10' }
                ]
            },
            {
                id: 4,
                name: '赵六',
                idCard: '110101198808084567',
                status: '在保',
                statusRecords: [
                    { date: '2024-01-20', status: '在保', operator: '管理员' }
                ],
                reports: [
                    { fileName: '赵六-110101198808084567-20240120.docx', date: '2024-01-20' },
                    { fileName: '赵六-110101198808084567-20240225.docx', date: '2024-02-25' },
                    { fileName: '赵六-110101198808084567-20240330.docx', date: '2024-03-30' }
                ],
                // 历史报告数据
                historyReports: [
                    { fileName: '赵六-110101198808084567-20230120.docx', date: '2023-01-20' },
                    { fileName: '赵六-110101198808084567-20230225.docx', date: '2023-02-25' }
                ]
            }
        ];

        let filteredData = [];
        let currentPage = 1;
        let totalPages = 1;
        let pageSize = 10;
        let currentUploadId = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            filteredData = [...documentData];
            renderTable();
            updateStats();
        });

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('documentTableBody');
            const emptyTip = document.getElementById('emptyTip');
            
            if (filteredData.length === 0) {
                tbody.innerHTML = '';
                emptyTip.style.display = 'block';
                return;
            }
            
            emptyTip.style.display = 'none';
            
            // 分页
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);
            
            tbody.innerHTML = pageData.map((item, index) => {
                const statusClass = item.status === '在保' ? 'status-insured' : 'status-uninsured';
                const statusStyle = item.status === '在保' 
                    ? 'background-color: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500;'
                    : 'background-color: #ffebee; color: #c62828; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500;';
                return `
                <tr>
                    <td>${start + index + 1}</td>
                    <td>${item.name}</td>
                    <td>${item.idCard}</td>
                    <td>${item.reports.length} 份</td>
                    <td><span style="${statusStyle}">${item.status}</span></td>
                    <td>
                        <div class="operate-btns">
                            <button class="btn-view" onclick="viewReports(${item.id})">查看</button>
                            <button class="btn-upload" onclick="openUploadModal(${item.id})">上传</button>
                            <button class="btn-default" onclick="changeStatus(${item.id})" style="padding: 4px 10px; font-size: 12px;">状态修改</button>
                            <button class="btn-delete" onclick="deletePerson(${item.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `}).join('');
            
            updatePagination();
        }

        // 更新统计
        function updateStats() {
            const totalPersons = documentData.length;
            const totalReports = documentData.reduce((sum, item) => sum + item.reports.length, 0);
            
            document.getElementById('totalPersons').textContent = totalPersons;
            document.getElementById('totalReports').textContent = totalReports;
        }

        // 更新分页
        function updatePagination() {
            totalPages = Math.ceil(filteredData.length / pageSize) || 1;
            
            document.getElementById('pageInfo').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
            document.getElementById('firstPage').disabled = currentPage === 1;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
            document.getElementById('lastPage').disabled = currentPage === totalPages;
        }

        // 跳转页面
        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
        }

        // 搜索功能
        function searchDocuments() {
            const name = document.getElementById('searchName').value.trim();
            const idCard = document.getElementById('searchIdCard').value.trim();
            const startDate = document.getElementById('searchStartDate').value;
            const endDate = document.getElementById('searchEndDate').value;
            
            filteredData = documentData.filter(item => {
                // 姓名匹配
                if (name && !item.name.includes(name)) return false;
                
                // 身份证号匹配
                if (idCard && !item.idCard.includes(idCard)) return false;
                
                // 日期范围匹配
                if (startDate || endDate) {
                    const hasMatch = item.reports.some(report => {
                        const reportDate = report.date;
                        if (startDate && reportDate < startDate) return false;
                        if (endDate && reportDate > endDate) return false;
                        return true;
                    });
                    if (!hasMatch) return false;
                }
                
                return true;
            });
            
            currentPage = 1;
            renderTable();
        }

        // 重置搜索
        function resetSearch() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchIdCard').value = '';
            document.getElementById('searchStartDate').value = '';
            document.getElementById('searchEndDate').value = '';
            filteredData = [...documentData];
            currentPage = 1;
            renderTable();
        }

        // 查看报告
        function viewReports(id) {
            const person = documentData.find(item => item.id === id);
            if (!person) return;
            
            // 当前报告列表
            const reportsHtml = person.reports.map(report => `
                <div class="report-list-item">
                    <div>
                        <div class="name">${report.fileName}</div>
                        <div class="date">上传时间：${report.date}</div>
                    </div>
                    <span class="delete" onclick="deleteReport(${id}, '${report.fileName}')">删除</span>
                </div>
            `).join('');
            
            // 历史报告列表
            const historyReportsHtml = person.historyReports && person.historyReports.length > 0 
                ? person.historyReports.map(report => `
                    <div class="report-list-item" style="background-color: #fff7e6; border-left: 3px solid #fa8c16;">
                        <div>
                            <div class="name">
                                <span style="background-color: #fa8c16; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 8px;">历史</span>
                                ${report.fileName}
                            </div>
                            <div class="date">报告日期：${report.date}</div>
                        </div>
                    </div>
                `).join('')
                : '<p style="color: #999; text-align: center;">暂无历史报告</p>';
            
            showCustomModal(
                `${person.name} 的报告列表`,
                `
                    <div style="max-height: 400px; overflow-y: auto;">
                        <div style="margin-bottom: 20px;">
                            <div style="font-size: 14px; font-weight: bold; color: #1e68c4; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #e8f0fe;">
                                📄 当前报告 (${person.reports.length}份)
                            </div>
                            <div class="report-list-modal">${reportsHtml || '<p style="color: #999; text-align: center;">暂无报告</p>'}</div>
                        </div>
                        <div>
                            <div style="font-size: 14px; font-weight: bold; color: #fa8c16; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #fff7e6;">
                                📚 历史报告 (${person.historyReports ? person.historyReports.length : 0}份)
                            </div>
                            <div class="report-list-modal">${historyReportsHtml}</div>
                        </div>
                    </div>
                `,
                [{ text: '关闭', class: 'btn-confirm', callback: closeCustomModal }]
            );
        }

        // 打开上传弹窗
        function openUploadModal(id) {
            currentUploadId = id;
            const person = documentData.find(item => item.id === id);
            
            showCustomModal(
                `上传报告 - ${person.name}`,
                `
                    <div class="upload-modal-body">
                        <div class="upload-area-modal" onclick="document.getElementById('fileInput').click()">
                            <div class="icon">📁</div>
                            <div class="text">点击选择文件或拖拽文件到此处</div>
                            <div class="tip">支持 .docx, .pdf 格式</div>
                        </div>
                    </div>
                `,
                [
                    { text: '取消', class: 'btn-cancel', callback: closeCustomModal },
                    { text: '确定', class: 'btn-confirm', callback: closeCustomModal }
                ]
            );
        }

        // 处理文件选择
        function handleFileSelect(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;
            
            const person = documentData.find(item => item.id === currentUploadId);
            if (!person) return;
            
            // 解析文件名：人名-身份证-核查年月日
            for (let file of files) {
                const fileName = file.name;
                const parts = fileName.replace(/\.[^/.]+$/, '').split('-');
                
                if (parts.length >= 3) {
                    const date = parts[2];
                    person.reports.push({
                        fileName: fileName,
                        date: date.substring(0, 4) + '-' + date.substring(4, 6) + '-' + date.substring(6, 8)
                    });
                }
            }
            
            closeCustomModal();
            showCustomAlert('上传成功', `成功上传 ${files.length} 个文件`);
            renderTable();
            updateStats();
        }

        // 删除报告
        function deleteReport(personId, fileName) {
            showCustomConfirm('确认删除', `确定要删除 "${fileName}" 吗？`, function() {
                const person = documentData.find(item => item.id === personId);
                if (person) {
                    person.reports = person.reports.filter(r => r.fileName !== fileName);
                    renderTable();
                    updateStats();
                    viewReports(personId); // 刷新查看弹窗
                }
            });
        }

        // 删除人员
        function deletePerson(id) {
            showCustomConfirm('确认删除', '确定要删除该人员及其所有报告吗？', function() {
                documentData = documentData.filter(item => item.id !== id);
                filteredData = filteredData.filter(item => item.id !== id);
                renderTable();
                updateStats();
            });
        }

        // 批量导入功能
        function openBatchImportModal() {
            showCustomModal(
                '批量导入',
                `
                    <div class="upload-modal-body">
                        <div class="upload-area-modal" onclick="document.getElementById('batchFileInput').click()">
                            <div class="icon">📁</div>
                            <div class="text">点击选择文件夹进行批量导入</div>
                            <div class="tip">系统将根据文件名自动匹配人名和身份证号<br>格式：人名-身份证-核查年月日.docx</div>
                        </div>
                    </div>
                `,
                [
                    { text: '取消', class: 'btn-cancel', callback: closeCustomModal }
                ]
            );
        }

        function handleBatchImport(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            closeCustomModal();

            let successCount = 0;
            let failCount = 0;
            let failList = [];

            for (let file of files) {
                const fileName = file.name;
                // 解析文件名：人名-身份证-核查年月日
                const parts = fileName.replace(/\.[^/.]+$/, '').split('-');

                if (parts.length >= 3) {
                    const name = parts[0];
                    const idCard = parts[1];
                    const dateStr = parts[2];

                    // 验证身份证号格式（18位）
                    if (idCard && idCard.length === 18) {
                        // 查找是否已存在该人员
                        let person = documentData.find(item => item.idCard === idCard);

                        if (!person) {
                            // 创建新人员
                            const today = new Date().toISOString().split('T')[0];
                            person = {
                                id: Date.now() + Math.random(),
                                name: name,
                                idCard: idCard,
                                status: '在保',
                                statusRecords: [
                                    { date: today, status: '在保', operator: '系统' }
                                ],
                                reports: []
                            };
                            documentData.push(person);
                        }

                        // 添加报告
                        const formattedDate = dateStr.substring(0, 4) + '-' + dateStr.substring(4, 6) + '-' + dateStr.substring(6, 8);
                        person.reports.push({
                            fileName: fileName,
                            date: formattedDate
                        });

                        successCount++;
                    } else {
                        failCount++;
                        failList.push(fileName);
                    }
                } else {
                    failCount++;
                    failList.push(fileName);
                }
            }

            // 显示导入结果
            let resultMessage = `成功导入 ${successCount} 个文件`;
            if (failCount > 0) {
                resultMessage += `<br><br>失败 ${failCount} 个文件：<br>${failList.slice(0, 5).join('<br>')}`;
                if (failList.length > 5) {
                    resultMessage += `<br>...等共 ${failList.length} 个文件`;
                }
            }

            showCustomAlert('导入完成', resultMessage);
            filteredData = [...documentData];
            renderTable();
            updateStats();
        }

        // 自定义弹窗功能
        let customModalCallback = null;

        function showCustomModal(title, content, buttons) {
            const modal = document.getElementById('customModal');
            const header = document.getElementById('customModalHeader');
            const body = document.getElementById('customModalBody');
            const footer = document.getElementById('customModalFooter');

            header.textContent = title;
            body.innerHTML = content;
            
            footer.innerHTML = buttons.map((btn, index) => 
                `<button class="${btn.class}" onclick="handleModalButton(${index})">${btn.text}</button>`
            ).join('');
            
            customModalCallback = buttons.map(btn => btn.callback);
            modal.classList.add('show');
        }

        function handleModalButton(index) {
            if (customModalCallback && customModalCallback[index]) {
                customModalCallback[index]();
            }
        }

        function showCustomAlert(title, message) {
            showCustomModal(title, message, [
                { text: '确定', class: 'btn-confirm', callback: closeCustomModal }
            ]);
        }

        function showCustomConfirm(title, message, onConfirm) {
            showCustomModal(title, message, [
                { text: '取消', class: 'btn-cancel', callback: closeCustomModal },
                { text: '确定', class: 'btn-confirm', callback: function() {
                    closeCustomModal();
                    if (onConfirm) onConfirm();
                }}
            ]);
        }

        function closeCustomModal() {
            const modal = document.getElementById('customModal');
            modal.classList.remove('show');
            customModalCallback = null;
        }

        // 点击弹窗外部关闭
        document.getElementById('customModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeCustomModal();
            }
        });

        // ========== 人员状态管理功能 ==========
        // 修改人员状态
        function changeStatus(personId) {
            const person = documentData.find(item => item.id === personId);
            if (!person) return;

            const currentStatus = person.status;
            const newStatus = currentStatus === '在保' ? '不在保' : '在保';
            const statusColor = newStatus === '在保' ? '#2e7d32' : '#c62828';

            showCustomModal(
                '修改人员状态',
                `
                    <div style="padding: 20px; text-align: center;">
                        <div style="font-size: 16px; margin-bottom: 20px;">
                            人员：<strong>${person.name}</strong>（${person.idCard}）
                        </div>
                        <div style="font-size: 14px; color: #666; margin-bottom: 20px;">
                            当前状态：<span style="font-weight: bold; color: ${currentStatus === '在保' ? '#2e7d32' : '#c62828'};">${currentStatus}</span>
                        </div>
                        <div style="font-size: 14px; color: #333; margin-bottom: 20px;">
                            是否将状态修改为 <span style="font-weight: bold; color: ${statusColor};">${newStatus}</span>？
                        </div>
                        <div style="background-color: #f5f5f5; padding: 15px; border-radius: 8px; text-align: left;">
                            <div style="font-size: 13px; color: #666; margin-bottom: 10px;">状态修改记录：</div>
                            ${person.statusRecords && person.statusRecords.length > 0 
                                ? person.statusRecords.slice().reverse().map(record => `
                                    <div style="font-size: 12px; color: #999; margin-bottom: 5px; padding: 5px 0; border-bottom: 1px dashed #ddd;">
                                        ${record.date} - ${record.status} - 操作人：${record.operator}
                                    </div>
                                `).join('')
                                : '<div style="font-size: 12px; color: #999;">暂无记录</div>'
                            }
                        </div>
                    </div>
                `,
                [
                    { text: '取消', class: 'btn-cancel', callback: closeCustomModal },
                    { text: '确认修改', class: 'btn-confirm', callback: function() {
                        // 更新状态
                        person.status = newStatus;
                        // 添加记录
                        if (!person.statusRecords) {
                            person.statusRecords = [];
                        }
                        const today = new Date().toISOString().split('T')[0];
                        person.statusRecords.push({
                            date: today,
                            status: newStatus,
                            operator: '管理员'
                        });
                        closeCustomModal();
                        showCustomAlert('修改成功', `已将 ${person.name} 的状态修改为 ${newStatus}`);
                        renderTable();
                    }}
                ]
            );
        }

        // ========== 选择人员生成对比报告功能 ==========
        let filteredPersonData = [...documentData];
        let selectedPersonIds = [];

        // 打开选择人员弹窗
        function openSelectPersonModal() {
            selectedPersonIds = [];
            document.getElementById('personSearchInput').value = '';
            filteredPersonData = [...documentData];
            renderPersonList();
            updateSelectedInfo();
            document.getElementById('selectPersonModal').classList.add('show');
        }

        // 关闭选择人员弹窗
        function closeSelectPersonModal() {
            document.getElementById('selectPersonModal').classList.remove('show');
        }

        // 渲染人员列表
        function renderPersonList() {
            const container = document.getElementById('personListContainer');

            if (filteredPersonData.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: #999;">暂无数据</div>';
                return;
            }

            container.innerHTML = filteredPersonData.map(person => {
                const isSelected = selectedPersonIds.includes(person.id);
                return `
                <div class="person-item" onclick="toggleSelectPerson(${person.id})"
                     style="padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: all 0.2s;
                     ${isSelected ? 'background-color: #e6f4ff; border-left: 3px solid #1e68c4;' : 'border-left: 3px solid transparent;'}">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 20px; height: 20px; border: 2px solid ${isSelected ? '#1e68c4' : '#ccc'}; border-radius: 4px; display: flex; align-items: center; justify-content: center; background-color: ${isSelected ? '#1e68c4' : '#fff'};">
                                ${isSelected ? '<span style="color: #fff; font-size: 12px;">✓</span>' : ''}
                            </div>
                            <div>
                                <div style="font-weight: bold; font-size: 15px; color: #333; margin-bottom: 5px;">${person.name}</div>
                                <div style="font-size: 13px; color: #666;">身份证号：${person.idCard}</div>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 13px; color: #1e68c4; font-weight: bold;">${person.reports.length} 份报告</div>
                            <div style="font-size: 12px; color: #999; margin-top: 3px;">
                                ${person.reports.slice(0, 3).map(r => r.date).join('、')}${person.reports.length > 3 ? '...' : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // 切换人员选择状态
        function toggleSelectPerson(id) {
            const index = selectedPersonIds.indexOf(id);
            if (index > -1) {
                selectedPersonIds.splice(index, 1);
            } else {
                selectedPersonIds.push(id);
            }
            renderPersonList();
            updateSelectedInfo();
        }

        // 更新选中人员信息显示
        function updateSelectedInfo() {
            const infoEl = document.getElementById('selectedPersonInfo');
            if (selectedPersonIds.length === 0) {
                infoEl.innerHTML = '未选择人员';
            } else {
                const selectedPersons = documentData.filter(p => selectedPersonIds.includes(p.id));
                const totalReports = selectedPersons.reduce((sum, p) => sum + p.reports.length, 0);
                infoEl.innerHTML = `已选择 <span style="color: #1e68c4; font-weight: bold;">${selectedPersonIds.length}</span> 位人员，共 <span style="color: #1e68c4; font-weight: bold;">${totalReports}</span> 份报告`;
            }
        }

        // 搜索人员
        function searchPerson() {
            const keyword = document.getElementById('personSearchInput').value.trim().toLowerCase();
            if (!keyword) {
                filteredPersonData = [...documentData];
            } else {
                filteredPersonData = documentData.filter(person =>
                    person.name.includes(keyword) ||
                    person.idCard.includes(keyword)
                );
            }
            renderPersonList();
        }

        // 生成报告
        function generateReportFromSelected() {
            if (selectedPersonIds.length === 0) {
                showCustomAlert('提示', '请至少选择一位人员');
                return;
            }

            closeSelectPersonModal();

            // 跳转到报告分析页面并传递参数
            const params = new URLSearchParams();
            params.set('personIds', selectedPersonIds.join(','));
            
            window.location.href = 'index.html?' + params.toString();
        }

        // 点击弹窗外部关闭
        document.getElementById('selectPersonModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeSelectPersonModal();
            }
        });
    </script>
</body>
</html>
